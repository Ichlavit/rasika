<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="1540 -70 380 380" xmlns="http://www.w3.org/2000/svg" data-type="ugc">
    <defs>
        <!-- Favicon specific diagonal gradient for energy -->
        <linearGradient id="favicon-tech-gradient" gradientUnits="userSpaceOnUse" x1="1550" y1="-60" x2="1910" y2="300">
            <stop offset="0%" stop-color="#A5F2F8" /> <!-- Lighter top edge -->
            <stop offset="50%" stop-color="#7CD6E0" />
            <stop offset="100%" stop-color="#5EA6B0" /> <!-- Base Cyan bottom edge -->
        </linearGradient>
        
        <!-- App-icon style subtle dark background matching CSS color-dark -->
        <linearGradient id="dark-bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1E2226" />
            <stop offset="100%" stop-color="#141619" />
        </linearGradient>

        <!-- Clipping path to ensure the bird perfectly hugs the bottom rounded corners -->
        <clipPath id="favicon-clip">
            <rect x="1550" y="-60" width="360" height="360" rx="80" />
        </clipPath>
    </defs>

    <!-- Rounded base for the Favicon -->
    <rect x="1550" y="-60" width="360" height="360" rx="80" fill="url(#dark-bg-gradient)" />

    <!-- Extracted Hummingbird Icon from Original Logo -->
    <g clip-path="url(#favicon-clip)">
        <!-- Scaled up 1.28x and translated to purposefully overlap the bottom so the clip-path eliminates any gaps -->
        <g transform="translate(-510, 25) scale(1.28)">
            <path d="M1733.87 85.2s-6.66 43.31-6 50.64c.57 6.61 3.13 67.49 61.37 97 1.07.55 2.15 1.08 3.26 1.6q5.74 2.7 12.19 5c-.56-.16 16.45-.11 34-.05l37.66-.06-52.78-184.81v-1.47c-27.26-17.24-83.26-6-89.69 32.15" fill="url(#favicon-tech-gradient)"/>
            <path d="M1805.41 14.78c-.61-.45-5-5.74-15.6-6.2l1.89-.68c-.69 0-3-.39-5.66-.41l-4.14.3a22.5 22.5 0 014.14-.3l6-.43c-1.77-.63-4.7-.64-7.26-.47l-5 .54s2.29-.37 5-.54l8.76-.94c-4.81-2.07-16.94 1-17.33.91l16.77-4c-7.69-.3-18.46 3.09-18.46 3.09l18-5.65c-13.59.31-24.81 6.13-30.19 8.37-18.4 7.65-38.69 20.28-42 50.94-.92 8.43-20 1.06-113 61.43 120.51-60.37 127.76-50.78 126.57-35.54 23.76 40.78 94.43 28.11 89.69-32.15-.29-17.13-7.43-30.28-18.18-38.27z" fill="url(#favicon-tech-gradient)"/>
        </g>
    </g>
</svg>